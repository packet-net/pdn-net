name: release

# Builds the pdn-net Debian packages (amd64 / arm64 / armhf) and attaches them to
# a GitHub Release. Triggered by pushing a `v*` tag (or run by hand via
# workflow_dispatch). NO apt repo — the .debs live on the Release.
#
# Self-hosted x64 only (org convention — no GitHub-hosted runners). The arm builds
# cross-publish self-contained from x64 (the .NET runtime pack per RID comes from
# NuGet), so one x64 host packages all three arches; packaging/build-deb.sh does the
# publish + packaging. Single job, no Actions artifact store: the .debs are built,
# install-smoked and released from the one job's local working tree.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version without the v prefix, e.g. 0.1.0'
        required: true

permissions:
  contents: read

jobs:
  release:
    runs-on: [self-hosted, Linux, X64]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - id: v
        name: Resolve version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build .debs (amd64 / arm64 / armhf)
        env:
          VERSION: ${{ steps.v.outputs.version }}
        run: |
          for rid in linux-x64 linux-arm64 linux-arm; do
            packaging/build-deb.sh "$rid" "$VERSION"
          done

      - name: Install-smoke the amd64 .deb (Debian-stable + Ubuntu-LTS)
        env:
          VERSION: ${{ steps.v.outputs.version }}
        # Gate: a .deb that won't install cleanly must never reach the release.
        # Container-isolated; skips with a warning if the runner has no docker.
        run: packaging/deb-install-smoke.sh "artifacts/pdn-net_${VERSION}_amd64.deb"

      - name: Checksums + GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.v.outputs.version }}
        run: |
          cd artifacts
          sha256sum pdn-net_*.deb > SHA256SUMS
          ls -l pdn-net_*.deb SHA256SUMS
          cd ..
          gh release create "v${VERSION}" \
            artifacts/pdn-net_*.deb artifacts/SHA256SUMS \
            --repo "${{ github.repository }}" \
            --title "pdn-net v${VERSION}" \
            --notes "IP-over-packet-radio TUN host stack (pdn-net) ${VERSION}. Install the \`.deb\` for your architecture (amd64 / arm64 / armhf) — no .NET runtime required (self-contained): \`sudo apt install ./pdn-net_${VERSION}_<arch>.deb\`. The systemd unit ships DISABLED: edit \`/etc/pdn-net/pdn-net.json\`, then \`sudo systemctl enable --now pdn-net\`. \`SHA256SUMS\` covers all three .debs."
